[mgr]
ratio = [1, 1, 2]
show_hidden = true

[opener]
edit = [
  { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
  { mime = "*/*", use = [ "edit" ] },
]

[preview]
max_width = 600
max_height = 900

[plugin]
prepend_previewers = [
  { mime = "image/*", run = "zoom" },
  { mime = "{audio,video}/*", run = "mediainfo" },
]
