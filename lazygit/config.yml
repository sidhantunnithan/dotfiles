gui:
  # Controls how far scrollUpMain/scrollDownMain move (PgUp/PgDn, Ctrl+U/Ctrl+D).
  # 12 is roughly half a page on a typical terminal height.
  scrollHeight: 12

git:
  paging:
    colorArg: always
    pager: delta --config /dev/null --paging=never --syntax-theme=OneHalfDark --line-numbers --hunk-header-style=syntax --hunk-header-decoration-style="blue ul" --hyperlinks --hyperlinks-file-link-format="lazygit-edit://{path}:{line}"
  prune: true
customCommands:
  - key: "G"
    command: |
      git fetch -p && for branch in $(git for-each-ref --format '%(refname) %(upstream:track)' refs/heads | awk '$2 == "[gone]" {sub("refs/heads/", "", $1); print $1}'); do git branch -D $branch; done
    context: "localBranches"
    description: "Prune local branches no longer on its remote; (G)one."
    loadingText: "Pruning gone..."
  - key: '<c-r>'
    context: 'tags'
    command: 'git tag {{.SelectedTag.Name}} -f && git push origin {{.SelectedTag.Name}} -f'
    output: log
    description: 'Retag and Push Selected Tag'
    loadingText: 'Retagging and Pushing Tag'
  - key: 'p'
    context: 'tags'
    command: 'git fetch origin --tags --prune-tags -f'
    output: log
    description: 'Pull all tags and prune gone ones (clobber existing)'
    loadingText: 'Pulling and Pruning Tags'
