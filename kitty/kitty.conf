# Kitty terminal configuration
# Matches alacritty appearance and behavior

# Quit without confirmation
confirm_os_window_close 0

# Window Settings
hide_window_decorations yes
dynamic_title_update_interval 0
background_opacity 0.9
remember_window_size yes

# Window Padding
window_padding_width 10

# Terminal Settings
# Note: kitty uses xterm-kitty by default, which is optimal
clipboard_control write-clipboard write-primary

# Cursor Settings
cursor_shape block
cursor_unfocus_style hollow

# Mouse Settings
mouse_hide_when_typing no

# Font Settings
font_family JetBrains Mono
font_style Bold
font_size 15.0

# Scrolling Settings
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# Selection Settings
copy_on_select no
select_by_word_characters @-./_~?&=%+#

# Keyboard Settings
# Alt+Left/Right for word navigation (shell-dependent, may be handled by shell config)
map alt+left send_text all \x1bb
map alt+right send_text all \x1bf

# Color Scheme
# Using Catppuccin Mocha (same as alacritty config)
include ./catppuccin-mocha.conf
